name: Sync Coding Stats

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  push:
    branches:
      - main
    paths-ignore:
      - 'src/data/stats-cache.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Stats Sync Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME || 'dharmendra-pandit' }}
          LEETCODE_USERNAME: ${{ vars.LEETCODE_USERNAME || 'dpbth' }}
          CODE360_UUID: ${{ vars.CODE360_UUID || 'panditbth' }}
          GFG_USERNAME: ${{ vars.GFG_USERNAME || 'iampanditbth' }}
          KAGGLE_USERNAME: ${{ vars.KAGGLE_USERNAME || 'dharmendrapandit12' }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: node scripts/sync-stats.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/stats-cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update dynamic stats cache [skip ci]" && git push)
